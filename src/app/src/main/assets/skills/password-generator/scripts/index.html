<!DOCTYPE html>
<html lang="en">
<body>
<script>
  const STORAGE_KEY = 'password_gen_result';

  window['ai_edge_gallery_get_result'] = async (dataStr) => {
    try {
      const input = JSON.parse(dataStr);
      const length = Math.min(Math.max(parseInt(input.length) || 16, 4), 128);
      const count = Math.min(Math.max(parseInt(input.count) || 1, 1), 10);
      const useUpper = input.uppercase !== false;
      const useLower = input.lowercase !== false;
      const useNumbers = input.numbers !== false;
      const useSymbols = input.symbols !== false;

      const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const LOWER = 'abcdefghijklmnopqrstuvwxyz';
      const NUMS = '0123456789';
      const SYMS = '!@#$%^&*()-_=+[]{}|;:,.<>?';

      const required = [];
      let charset = '';
      if (useUpper)   { required.push(UPPER); charset += UPPER; }
      if (useLower)   { required.push(LOWER); charset += LOWER; }
      if (useNumbers) { required.push(NUMS);  charset += NUMS; }
      if (useSymbols) { required.push(SYMS);  charset += SYMS; }
      if (!charset)   { required.push(UPPER, LOWER, NUMS); charset = UPPER + LOWER + NUMS; }

      function generate() {
        const buf = new Uint32Array(length + required.length + 10);
        crypto.getRandomValues(buf);
        const chars = [];
        // guarantee at least one char from each required set
        for (let i = 0; i < required.length; i++) {
          chars.push(required[i][buf[i] % required[i].length]);
        }
        // fill the rest
        for (let i = required.length; i < length; i++) {
          chars.push(charset[buf[i] % charset.length]);
        }
        // Fisher-Yates shuffle using remaining random values
        const shuffleBuf = new Uint32Array(chars.length);
        crypto.getRandomValues(shuffleBuf);
        for (let i = chars.length - 1; i > 0; i--) {
          const j = shuffleBuf[i] % (i + 1);
          [chars[i], chars[j]] = [chars[j], chars[i]];
        }
        return chars.slice(0, length).join('');
      }

      const passwords = Array.from({ length: count }, generate);

      // Strength score (0-5)
      let strength = 0;
      if (length >= 12) strength++;
      if (length >= 16) strength++;
      if (useUpper && useLower) strength++;
      if (useNumbers) strength++;
      if (useSymbols) strength++;
      const strengthLabel = ['Weak','Weak','Moderate','Strong','Strong','Very Strong'][strength];

      const resultText = count === 1
        ? `Password (${length} chars · ${strengthLabel}):\n${passwords[0]}`
        : `${count} passwords (${length} chars · ${strengthLabel}):\n${passwords.map((p, i) => `${i + 1}. ${p}`).join('\n')}`;

      localStorage.setItem(STORAGE_KEY, JSON.stringify({ passwords, length, strengthLabel, strength }));

      return JSON.stringify({
        result: resultText,
        webview: { url: 'display.html' }
      });
    } catch (e) {
      return JSON.stringify({ error: `Password Generator error: ${e.message}` });
    }
  };
</script>
</body>
</html>
